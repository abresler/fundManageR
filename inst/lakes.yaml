# dq Lake Registry — single source of truth.
# Each lake declares its source function, schema, partition, cadence, and gates.
# Crontab + sentinel + writer all derive from this file.
#
# Author: Alex Bresler · 2026-05-01

lakes:

  - name: market_metainfo
    description: "TV metric-field dictionary (name, type, region, snapshot)"
    source_pkg: fundManageR
    source_call: "tv_metainfo(region = 'america')"   # evaluated in fundManageR namespace
    lake_root: "~/Desktop/data/securities"
    partition_key: "snapshot"
    partition_value: "current"                        # static; overwrites each refresh
    schema:
      name_field:         character
      type_field:         character
      name_region:        character
      date_snapshot:      Date
      datetime_snapshot:  POSIXct
      slug_suffix_family: character
    cadence:
      cron: "8 9 * * 1"                               # Mon 09:08 ET
      timezone: America/New_York
      max_age_days: 8
    gates:
      liveness_url: "https://scanner.tradingview.com/america/metainfo"
      row_floor:    0.8
      snake_case:   true
    on_failure: "warn_only"

  - name: tv_tickers_by_region
    description: "TV listed-security universe across 6 regions"
    source_pkg: fundManageR
    source_call: |
      purrr::map_dfr(
        c('america','germany','india','japan','uk','canada'),
        function(r) tv_regions_tickers(regions = r) %>% dplyr::mutate(region_pulled = r)
      )
    lake_root: "~/Desktop/data/tradingview_lake"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"                     # monthly
    schema:
      region_securities: character
      id_exchange:       character
      id_ticker:         character
      type_security:     character
      url_json:          character
      region_pulled:     character
    cadence:
      cron: "0 9 * * 1"                              # Mon 09:00 ET
      timezone: America/New_York
      max_age_days: 8
    gates:
      liveness_url: "https://scanner.tradingview.com/america/scan"
      row_floor:    0.8
      snake_case:   true

  - name: tv_metrics_catalog
    description: "TV searchable-metric catalog across 6 regions"
    source_pkg: fundManageR
    source_call: |
      purrr::map_dfr(
        c('america','germany','india','japan','uk','canada'),
        function(r) tv_regions_metrics(regions = r) %>% dplyr::mutate(region_pulled = r)
      )
    lake_root: "~/Desktop/data/tradingview_lake"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"
    schema:
      region_securities:  character
      financial_currency: character
      name_tw:            character
      base_timeframe:     character
      type_field:         character
      is_hh:              logical
      is_rr:              logical
      agg:                logical
      url_json:           character
      region_pulled:      character
    cadence:
      cron: "0 9 * * 1"
      timezone: America/New_York
      max_age_days: 8
    gates:
      liveness_url: "https://scanner.tradingview.com/america/metainfo"
      row_floor:    0.8
      snake_case:   true

  - name: tv_market_events
    description: "TV economic-calendar releases (rolling 30 days)"
    source_pkg: fundManageR
    source_call: "tv_market_events(return_message = FALSE)"
    lake_root: "~/Desktop/data/tradingview_lake"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"
    schema:
      date_release:        Date
      datetime_release:    POSIXct
      slug_currency:       character
      name_indicator:      character
      forecast_data:       numeric
      actual_data:         numeric
      previous_data:       numeric
      rank_importance:     integer
    cadence:
      cron: "0 9 * * 1"
      timezone: America/New_York
      max_age_days: 8
    gates:
      liveness_url: "https://scanner.tradingview.com/america/scan"
      row_floor:    0.5    # event count varies week-to-week
      snake_case:   true

  # ─── Orchestrator-driven lakes (existing $HOME-fixed cron entries) ───
  # These call lakes_orchestrator/run_schedule.R via shell (source_command).
  # Registry tracks them for audit + crontab regen, doesn't take over execution.

  - name: market_unified
    description: "Unified securities snapshot (equity+bond+futures+crypto+coin+forex+cfd)"
    source_pkg: fundManageR
    source_command: "/Library/Frameworks/R.framework/Versions/Current/Resources/bin/Rscript /Users/alexbresler/cronR_jobs/securities_lake/code/build_market_unified.R"
    lake_root: "~/Desktop/data/securities"
    partition_key: "snapshot"
    partition_value: "current"
    cadence:
      cron: "3 13 * * 1-5"   # weekday afternoon (caffeinate auto-applied by lake_to_cron)
      timezone: America/New_York
      max_age_days: 2
    gates:
      row_floor: 0.8

  - name: fpds_nightly
    description: "FPDS contracts last-120-day download + marker-driven append"
    source_pkg: fundManageR
    source_command: "/Users/alexbresler/cronR_jobs/fpds_nightly.sh"
    lake_root: "~/Desktop/data/fpds"
    partition_key: "snapshot"
    partition_value: "current"
    cadence:
      cron: "30 23 * * 1-5"
      timezone: America/New_York
      max_age_days: 4

  - name: securities_entity_resolution
    description: "Cross-source entity resolution (CRD/CIK/BD/CUSIP) for securities"
    source_pkg: fundManageR
    source_command: "/Library/Frameworks/R.framework/Versions/Current/Resources/bin/Rscript /Users/alexbresler/cronR_jobs/lakes_orchestrator/code/run_schedule.R --lake=securities_entity_resolution"
    lake_root: "~/Desktop/data/securities"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"
    cadence:
      cron: "30 4 1-7 * 1"   # 1st Monday of month
      timezone: America/New_York
      max_age_days: 35
    gates:
      row_floor: 0.8

  - name: sec_adv_full_compilation
    description: "Full SEC ADV scrape (~44k advisers, ~60min)"
    source_pkg: fundManageR
    source_command: "/Library/Frameworks/R.framework/Versions/Current/Resources/bin/Rscript /Users/alexbresler/cronR_jobs/lakes_orchestrator/code/run_schedule.R --lake=sec_adv_full_compilation"
    lake_root: "~/Desktop/data/sec_adv"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"
    cadence:
      cron: "30 2 1-7 * 1"
      timezone: America/New_York
      max_age_days: 35
    gates:
      row_floor: 0.85

  - name: gleif_lei_full
    description: "GLEIF LEI registry (~3.29M entities, 458MB download)"
    source_pkg: fundManageR
    source_command: "/Library/Frameworks/R.framework/Versions/Current/Resources/bin/Rscript /Users/alexbresler/cronR_jobs/lakes_orchestrator/code/run_schedule.R --lake=gleif_lei_full"
    lake_root: "~/Desktop/data/gleif"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"
    cadence:
      cron: "0 3 1-7 * 0"    # 1st Sunday of month
      timezone: America/New_York
      max_age_days: 35
    gates:
      row_floor: 0.9

  - name: sec_nport_quarterly
    description: "SEC DERA N-PORT 463MB ZIP, ~24M rows"
    source_pkg: fundManageR
    source_command: "/Library/Frameworks/R.framework/Versions/Current/Resources/bin/Rscript /Users/alexbresler/cronR_jobs/lakes_orchestrator/code/run_schedule.R --lake=sec_nport_quarterly"
    lake_root: "~/Desktop/data/sec_filings_lake"
    partition_key: "batch"
    partition_value: "{YYYY-MM}"
    cadence:
      cron: "0 4 16 * *"     # 16th of month
      timezone: America/New_York
      max_age_days: 35
    gates:
      row_floor: 0.9
